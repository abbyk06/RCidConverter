    <!DOCTYPE html>
    <html>
    <head>
    <title>Number Converter</title>
    </head>
    <body>
    <h2>Number Converter</h2>

    <button onclick="showTab('csv')">CSV Batch</button>
    <button onclick="showTab('single')">Single Number</button>

    <hr>

    <!-- CSV TAB -->
    <div id="tab-csv">
    <p>Upload a CSV. Outputs a new CSV with Secondary Card Number added.</p>
    <p>Make sure not to convert after opening in Excel.</p>

    <input type="file" id="fileInput" accept=".csv">
    <button onclick="convertCSV()">Convert</button>
    <br><br>
    <pre id="log" style="background:#eee;padding:8px;max-height:200px;overflow:auto;"></pre>
    <br>
    <button id="downloadBtn" onclick="downloadCSV()" disabled>Download output.csv</button>
    </div>

    <!-- SINGLE TAB -->
    <div id="tab-single" style="display:none">
    <p>Enter a Konica card number to get the Canon equivalent.</p>

    <label>Konica (Primary) Card Number:<br>
        <input type="text" id="singleInput" placeholder="e.g. 123456789" style="width:300px">
    </label>
    <button onclick="convertSingle()">Convert</button>
    <br><br>
    <div id="singleResult"></div>

    <br>
    <h4>Bulk: one number per line</h4>
    <textarea id="bulkInput" rows="8" cols="40" placeholder="123456789&#10;987654321&#10;..."></textarea>
    <br>
    <button onclick="convertBulk()">Convert All</button>
    <br><br>
    <pre id="bulkResult" style="background:#eee;padding:8px;max-height:300px;overflow:auto;"></pre>
    <button id="bulkDownloadBtn" onclick="downloadBulk()" style="display:none">Download results.csv</button>
    </div>

    <script>
    let outputCsv = "";
    let bulkCsv = "";

    function showTab(tab) {
        document.getElementById("tab-csv").style.display = tab === "csv" ? "" : "none";
        document.getElementById("tab-single").style.display = tab === "single" ? "" : "none";
    }

    function log(msg) {
        document.getElementById("log").textContent += msg + "\n";
    }

    function konicaToCanon(decimal) {
        const buf = new ArrayBuffer(8);
        const view = new DataView(buf);
        let n = BigInt(decimal);
        for (let i = 0; i < 8; i++) {
        view.setUint8(i, Number(n & 0xFFn));
        n >>= 8n;
        }
        let result = 0n;
        for (let i = 0; i < 8; i++) {
        result = (result << 8n) | BigInt(view.getUint8(i));
        }
        return result.toString();
    }

    // --- Single ---
    function convertSingle() {
        const raw = document.getElementById("singleInput").value.trim().replace(/,/g, "");
        const out = document.getElementById("singleResult");
        if (!raw || !/^\d+$/.test(raw)) {
        out.textContent = "Invalid number.";
        return;
        }
        const canon = konicaToCanon(raw);
        out.innerHTML = `<b>Konica:</b> ${raw}<br><b>Canon:</b> ${canon}`;
    }

    // --- Bulk single ---
    function convertBulk() {
        const lines = document.getElementById("bulkInput").value.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
        if (!lines.length) return;

        let text = "Konica (Primary),Canon (Secondary)\n";
        let display = "";
        for (const raw of lines) {
        const num = raw.replace(/,/g, "");
        if (!/^\d+$/.test(num)) {
            display += `${raw} → SKIPPED (not a number)\n`;
            text += `${raw},\n`;
            continue;
        }
        const canon = konicaToCanon(num);
        display += `${raw} → ${canon}\n`;
        text += `${raw},${canon}\n`;
        }

        document.getElementById("bulkResult").textContent = display;
        bulkCsv = text;
        document.getElementById("bulkDownloadBtn").style.display = "";
    }

    function downloadBulk() {
        const blob = new Blob([bulkCsv], { type: "text/csv" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "results.csv";
        a.click();
    }

    // --- CSV batch ---
    function parseCSV(text) {
        const lines = text.split(/\r?\n/);
        const headers = splitLine(lines[0]);
        const rows = [];
        for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const vals = splitLine(lines[i]);
        const row = {};
        headers.forEach((h, idx) => row[h] = vals[idx] ?? "");
        rows.push(row);
        }
        return { headers, rows };
    }

    function splitLine(line) {
        const result = [];
        let cur = "", inQuote = false;
        for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQuote = !inQuote; }
        else if (c === ',' && !inQuote) { result.push(cur); cur = ""; }
        else { cur += c; }
        }
        result.push(cur);
        return result;
    }

    function toCSV(headers, rows) {
        const escape = v => (v.includes(",") || v.includes('"') || v.includes("\n")) ? `"${v.replace(/"/g,'""')}"` : v;
        const lines = [headers.map(escape).join(",")];
        for (const row of rows) {
        lines.push(headers.map(h => escape(row[h] ?? "")).join(","));
        }
        return lines.join("\r\n");
    }

    function convertCSV() {
        const file = document.getElementById("fileInput").files[0];
        if (!file) { alert("Pick a file first."); return; }
        document.getElementById("log").textContent = "";
        outputCsv = "";
        document.getElementById("downloadBtn").disabled = true;

        const reader = new FileReader();
        reader.onload = e => {
        try {
            const { headers, rows } = parseCSV(e.target.result);
            const outHeaders = headers.includes("Secondary Card Number")
            ? headers
            : [...headers, "Secondary Card Number"];

            for (const row of rows) {
            const raw = (row["Primary Card Number"] || "").trim();
            if (!raw) {
                log(`Skipping row (no primary card number)`);
                row["Secondary Card Number"] = "";
                continue;
            }
            const num = raw.replace(/,/g, "");
            if (!/^\d+$/.test(num)) {
                log(`Skipped (not a number): ${raw}`);
                row["Secondary Card Number"] = "";
                continue;
            }
            const canon = konicaToCanon(num);
            log(`Converting: ${raw} → ${canon}`);
            row["Secondary Card Number"] = canon;
            }

            outputCsv = toCSV(outHeaders, rows);
            log("\nDone.");
            document.getElementById("downloadBtn").disabled = false;
        } catch (err) {
            log("Error: " + err.message);
        }
        };
        reader.readAsText(file, "utf-8");
    }

    function downloadCSV() {
        const blob = new Blob([outputCsv], { type: "text/csv" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "output.csv";
        a.click();
    }
    </script>
    </body>
    </html>
